<div style="max-width: 480px; margin: 48px auto; padding: 0 16px;">
  <a routerLink="/admin">&larr; Back to admin dashboard</a>
  <h1>Manage user status</h1>
  <p>Enter a user's ID to activate or suspend their account.</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field style="width: 100%;">
      <mat-label>User ID</mat-label>
      <input matInput formControlName="userId" />
    </mat-form-field>

    <mat-form-field style="width: 100%;">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="ACTIVE">Active</mat-option>
        <mat-option value="SUSPENDED">Suspended</mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || submitting()">
      Save status
    </button>
  </form>

  @if (result(); as r) {
    <p>{{ r.email }} is now <strong>{{ r.status }}</strong>.</p>
  }
  @if (error()) {
    <p style="color: var(--mat-sys-error)">{{ error() }}</p>
  }
</div>
