<form [formGroup]="form" (ngSubmit)="submit()" style="max-width: 320px; margin: 48px auto; display: flex; flex-direction: column; gap: 8px;">
  <h1>Register</h1>

  <mat-form-field>
    <mat-label>Email</mat-label>
    <input matInput type="email" formControlName="email" />
  </mat-form-field>

  <mat-form-field>
    <mat-label>Password</mat-label>
    <input matInput type="password" formControlName="password" />
  </mat-form-field>

  <mat-form-field>
    <mat-label>I am a...</mat-label>
    <mat-select formControlName="role">
      <mat-option value="CANDIDATE">Candidate</mat-option>
      <mat-option value="EMPLOYER">Employer</mat-option>
    </mat-select>
  </mat-form-field>

  @if (error()) {
    <p style="color: var(--mat-sys-error)">{{ error() }}</p>
  }

  <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Register</button>
  <a routerLink="/login">Already have an account? Log in</a>
</form>
