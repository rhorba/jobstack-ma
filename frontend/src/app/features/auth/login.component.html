<form [formGroup]="form" (ngSubmit)="submit()" style="max-width: 320px; margin: 48px auto; display: flex; flex-direction: column; gap: 8px;">
  <h1>Log in</h1>

  <mat-form-field>
    <mat-label>Email</mat-label>
    <input matInput type="email" formControlName="email" />
  </mat-form-field>

  <mat-form-field>
    <mat-label>Password</mat-label>
    <input matInput type="password" formControlName="password" />
  </mat-form-field>

  @if (error()) {
    <p style="color: var(--mat-sys-error)">{{ error() }}</p>
  }

  <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Log in</button>
  <a routerLink="/register">Need an account? Register</a>
</form>
