name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '25', distribution: 'temurin', cache: 'maven' }
      - run: chmod +x mvnw
      - name: Test + coverage gate (>=80% lines)
        run: ./mvnw -B verify
      - name: Dependency scan (SCA)
        uses: aquasecurity/trivy-action@master
        with: { scan-type: fs, scan-ref: backend, severity: 'CRITICAL,HIGH', exit-code: '1' }

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - name: Test + coverage gate (>=80%)
        run: npm run test:ci
      - run: npm run build
      - name: Dependency scan (SCA)
        uses: aquasecurity/trivy-action@master
        with: { scan-type: fs, scan-ref: frontend, severity: 'CRITICAL,HIGH', exit-code: '1' }

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with: { config: p/owasp-top-ten }
      - uses: gitleaks/gitleaks-action@v2

  build:
    needs: [backend, frontend, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t jobstack-api ./backend
      - run: docker build -t jobstack-web ./frontend
      - uses: aquasecurity/trivy-action@master
        with: { scan-type: image, image-ref: 'jobstack-api', severity: 'CRITICAL,HIGH', exit-code: '1' }
