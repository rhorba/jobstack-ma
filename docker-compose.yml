services:
  nginx:
    build: ./frontend
    ports:
      - "8090:80"
    depends_on:
      - api

  api:
    build: ./backend
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-jobstack}
      POSTGRES_USER: ${DB_USER:-jobstack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jobstack}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
