spring.application.name=jobstack-api
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jobstack}
spring.datasource.username=${DB_USER:jobstack}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

jwt.secret=${JWT_SECRET:dev-only-insecure-secret-change-me-please-1234567890}
admin.seed.email=${ADMIN_SEED_EMAIL:}
admin.seed.password=${ADMIN_SEED_PASSWORD:}

cv.storage.path=${CV_STORAGE_PATH:/data/cvs}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

cmi.store-key=${CMI_STORE_KEY:changeme}

spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from-address=${SMTP_FROM_ADDRESS:no-reply@jobstack.ma}
job.expiry-notice.days-before=3
