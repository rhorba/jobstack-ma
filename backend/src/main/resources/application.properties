spring.application.name=jobstack-api
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jobstack}
spring.datasource.username=${DB_USER:jobstack}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

jwt.secret=${JWT_SECRET:dev-only-insecure-secret-change-me-please-1234567890}
admin.seed.email=${ADMIN_SEED_EMAIL:}
admin.seed.password=${ADMIN_SEED_PASSWORD:}
